<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOPaint Vercel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .image-container {
            position: relative;
            display: inline-block;
        }
        .preview-img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border: 2px dashed #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">IOPaint Serverless</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <!-- Image Input -->
            <div class="space-y-4">
                <label class="block text-sm font-medium text-gray-700">Original Image</label>
                <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-gray-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-blue-50 file:text-blue-700
                    hover:file:bg-blue-100
                "/>
                <div class="image-container w-full h-64 bg-gray-50 rounded-lg flex items-center justify-center overflow-hidden">
                    <img id="imagePreview" class="preview-img hidden" alt="Original Image">
                    <span id="imagePlaceholder" class="text-gray-400">No image selected</span>
                </div>
            </div>

            <!-- Mask Input -->
            <div class="space-y-4">
                <label class="block text-sm font-medium text-gray-700">Mask Image (Black & White)</label>
                <input type="file" id="maskInput" accept="image/*" class="block w-full text-sm text-gray-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-blue-50 file:text-blue-700
                    hover:file:bg-blue-100
                "/>
                <div class="image-container w-full h-64 bg-gray-50 rounded-lg flex items-center justify-center overflow-hidden">
                    <img id="maskPreview" class="preview-img hidden" alt="Mask Image">
                    <span id="maskPlaceholder" class="text-gray-400">No mask selected</span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-center mb-8">
            <button id="processBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                Start Inpainting
            </button>
        </div>

        <!-- Status -->
        <div id="statusArea" class="hidden mb-8 text-center">
            <div class="inline-flex items-center space-x-2 text-blue-600">
                <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="statusText" class="font-medium">Processing...</span>
            </div>
        </div>

        <!-- Result -->
        <div id="resultArea" class="hidden border-t pt-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">Result</h2>
            <div class="flex justify-center">
                <div class="relative group">
                    <img id="resultImage" class="max-w-full rounded-lg shadow-xl" alt="Result">
                    <a id="downloadBtn" href="#" download="result.png" class="absolute bottom-4 right-4 bg-white p-2 rounded-full shadow hover:bg-gray-100 opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
